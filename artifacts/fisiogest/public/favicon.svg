<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#008080"/>
      <stop offset="100%" stop-color="#005f5f"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Head -->
  <circle cx="100" cy="40" r="17" fill="white"/>
  <!-- Spine -->
  <line x1="100" y1="59" x2="100" y2="118" stroke="white" stroke-width="13" stroke-linecap="round"/>
  <!-- Left arm curved -->
  <path d="M100 80 Q80 67 48 54" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Right arm curved -->
  <path d="M100 80 Q120 67 152 54" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Left leg -->
  <path d="M100 118 Q84 133 68 158" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Right leg -->
  <path d="M100 118 Q116 133 132 158" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  <!-- Cross accent -->
  <rect x="156" y="24" width="8" height="30" rx="4" fill="white" opacity="0.55"/>
  <rect x="143" y="35" width="30" height="8" rx="4" fill="white" opacity="0.55"/>
  <!-- Healing dot -->
  <circle cx="156" cy="52" r="6" fill="white" opacity="0.75"/>
</svg>
