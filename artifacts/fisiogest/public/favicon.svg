<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background in brand teal -->
  <rect width="180" height="180" rx="36" fill="#007f7f"/>
  <!-- Head -->
  <circle cx="90" cy="42" r="15" fill="white"/>
  <!-- Torso -->
  <line x1="90" y1="60" x2="90" y2="108" stroke="white" stroke-width="11" stroke-linecap="round"/>
  <!-- Left arm raised diagonally -->
  <line x1="90" y1="76" x2="44" y2="52" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Right arm raised diagonally -->
  <line x1="90" y1="76" x2="136" y2="52" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="90" y1="108" x2="66" y2="148" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="90" y1="108" x2="114" y2="148" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Small cross/plus accent bottom-right corner -->
  <rect x="128" y="120" width="8" height="28" rx="4" fill="white" opacity="0.55"/>
  <rect x="118" y="130" width="28" height="8" rx="4" fill="white" opacity="0.55"/>
</svg>
